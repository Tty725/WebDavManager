<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <title>WebDAV - 未名的云</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 1200px; 
            margin: 20px auto; 
            padding: 0 15px;
            line-height: 1.6;
            color: #333;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 1.5em;
            color: #222;
        }
        
        /* 工具栏：移动端自动换行 */
        .toolbar {
            margin-bottom: 20px;
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        #fileInput {
            flex: 1;
            min-width: 180px;
            padding: 8px;
            font-size: 1em;
        }
        /* 按钮容器：在移动端右对齐 */
        .toolbar-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        
        /* 路径导航 */
        .path-nav { 
            margin-bottom: 15px; 
            font-size: 1em;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            word-break: break-all;
        }
        .path-nav a { 
            color: #1890ff; 
            text-decoration: none; 
        }
        .path-nav a:hover { 
            text-decoration: underline; 
        }

        /* PC端表头（移动端隐藏） */
        .file-list-header {
            display: none; /* 默认隐藏，PC端媒体查询显示 */
        }

        /* 文件列表容器 */
        #fileList {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eee;
        }

        /* 文件项：移动端默认垂直堆叠 */
        .file-item { 
            display: flex;
            flex-direction: column;
            padding: 12px 15px; 
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
            transition: background 0.2s;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-item:active { 
            background: #f8f9fa; 
        }

        /* 文件名行 */
        .file-name-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .file-icon {
            font-size: 1.2em;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .file-name {
            flex: 1;
            word-break: break-all;
            font-weight: 500;
            color: #333;
        }
        .file-name a {
            color: #1890ff;
            text-decoration: none;
        }
        .file-name a:hover {
            text-decoration: underline;
        }

        /* 元数据行（大小+时间） */
        .file-meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
        }

        /* 操作按钮行 */
        .file-op-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        /* 按钮样式：增大触摸区域 */
        .btn { 
            padding: 8px 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-size: 0.9em;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }
        .btn:active {
            opacity: 0.7;
        }
        .btn-primary { 
            background: #1890ff; 
            color: white; 
        }
        .btn-danger { 
            background: #ff4d4f; 
            color: white; 
        }
        .btn-default { 
            background: #e6e6e6; 
            color: #333; 
        }

        /* 状态提示 */
        .loading, .error {
            padding: 40px 20px;
            text-align: center;
            color: #666;
        }
        .error {
            color: #ff4d4f;
        }

        /* ========== 关键：PC端媒体查询（屏幕宽度 > 768px） ========== */
        @media (min-width: 768px) {
            body {
                margin: 30px auto;
                padding: 0 20px;
            }
            h1 {
                font-size: 1.8em;
            }

            /* 显示PC端表头 */
            .file-list-header {
                display: flex;
                padding: 12px 15px;
                background: #fafafa;
                font-weight: 600;
                color: #666;
                border-bottom: 1px solid #eee;
            }
            .file-name-col { flex: 3; }
            .file-size-col { text-align: right; flex: 1; min-width: 20px; }
            .file-time-col { text-align: right; flex: 1.5; min-width: 50px; }
            .file-op-col { flex: 1; text-align: right; min-width: 280px; }

            /* 文件项改回横向布局 */
            .file-item { 
                flex-direction: row;
                align-items: center;
                padding: 12px 15px;
            }

            /* PC端文件项横向布局，和表头对齐 */
            .file-item {
                flex-direction: row;
                align-items: center;
            }
            /* PC端各列宽度和表头严格对应 */
            .file-name-row { flex: 3; margin-right: 15px; margin-bottom: 0; }
            .file-meta-row {
                flex: 2.5;
                justify-content: flex-start;
                gap: 0;
                margin-bottom: 0;
            }
            .file-op-row {
                flex: 1;
                justify-content: flex-end;
                gap: 10px; /* 和工具栏按钮间距完全一致 */
            }
            /* 优化PC端列布局 - 与表头严格对齐 */
            .file-icon {
                margin-right: 8px;
            }
            /* 文件名列 */
            .file-name-row {
                flex: 3;
                margin-right: 15px;
                margin-bottom: 0;
            }
            .file-name {
                margin-bottom: 0;
                font-weight: normal;
            }

            /* 元数据列（包含大小和时间） - 调整为与表头对齐 */
            .file-meta-row {
                display: flex;
                flex: 2.5; /* 1 + 1.5 = 2.5，与表头大小+时间列总和一致 */
                justify-content: flex-start;
                gap: 0; /* 取消间隔，使用与表头相同的对齐方式 */
                margin-bottom: 0;
            }
            .file-meta {
                color: #666;
                font-size: 0.9em;
            }
            /* 文件大小列 - 与表头 .file-size-col 一致 */
            .file-size {
                text-align: right;
                flex: 1;
                min-width: 20px;
                margin-bottom: 0;
            }
            /* 文件时间列 - 与表头 .file-time-col 一致 */
            .file-time {
                text-align: right;
                flex: 1.5;
                min-width: 50px;
                margin-bottom: 0;
            }
            /* 操作列 - 与表头 .file-op-col 严格一致 */
            .file-op-row {
                flex: 1;
                text-align: right;
                min-width: 280px;
                margin-bottom: 0;
            }

            /* PC端上传进度条布局 */
            .progress-item {
                flex-direction: row !important;
                align-items: center !important;
            }
            .progress-file-name {
                flex: 2;
                margin-right: 15px;
                margin-bottom: 0 !important;
            }
            .progress-bar-container {
                flex: 2;
                margin-right: 15px;
                margin-bottom: 0 !important;
            }
            .progress-status {
                flex: 0 0 80px;
                margin-right: 10px;
                margin-bottom: 0 !important;
                text-align: right;
            }
            .progress-btn-cancel {
                flex: 0 0 auto;
                margin-bottom: 0 !important;
            }
        }

        /* ========== 上传进度条样式 ========== */
        .progress-item {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .progress-item:last-child {
            border-bottom: none;
        }
        .progress-file-name {
            font-size: 0.9em;
            color: #333;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .progress-bar-container {
            width: 100%;
            height: 20px;
            background: #e8e8e8;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #1890ff, #52c41a);
            border-radius: 10px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
        }
        .progress-bar-text {
            font-size: 0.75em;
            color: white;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .progress-status {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
        }
        .progress-status.success {
            color: #52c41a;
        }
        .progress-status.error {
            color: #ff4d4f;
        }
        .progress-btn-cancel {
            padding: 6px 12px;
            font-size: 0.85em;
            min-height: 36px;
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <h1>WebDAV 文件管理器</h1>

    <!-- 路径导航 -->
    <div class="path-nav" id="pathNav"></div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <input type="file" id="fileInput" multiple>
        <div class="toolbar-buttons">
            <button class="btn btn-primary" id="uploadBtn">上传选中文件</button>
            <button class="btn btn-default" id="createDirBtn">新建目录</button>
        </div>
    </div>

    <!-- 上传进度条区域 -->
    <div id="uploadProgressArea" style="display: none; margin-bottom: 20px; padding: 12px; background: #f5f7fa; border-radius: 8px;">
        <h3 style="margin-bottom: 10px; font-size: 1em; color: #222;">上传进度</h3>
        <div id="progressList"></div>
    </div>

    <!-- PC端表头 -->
    <div class="file-list-header">
        <div class="file-name-col">文件名</div>
        <div class="file-size-col">大小</div>
        <div class="file-time-col">修改时间</div>
        <div class="file-op-col">操作</div>
    </div>

    <!-- 文件列表 -->
    <div id="fileList"></div>

    <script>
    // ========== 核心配置（和Nginx配置保持一致即可） ==========
    const DAV_API_ROOT = '/dav/';

    // 支持在线浏览的文件扩展名列表（可配置）
    const VIEWABLE_EXTENSIONS = [
        // HTML/XML
        'html', 'htm', 'xml', 'xhtml',
        // 图片
        'png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'svg', 'ico',
        // 文本
        'txt', 'md', 'json', 'css', 'js', 'ts', 'jsx', 'tsx', 'py', 'java', 'cpp', 'c', 'h', 'rb', 'php', 'sh', 'bat',
        // 文档
        'pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx',
        // 媒体
        'mp3', 'mp4', 'webm', 'wav', 'ogg', 'flac', 'avi', 'mov', 'mkv'
    ];
    // ==========================================================

    // 全局状态
    let currentRelativePath = '';
    const fileListEl = document.getElementById('fileList');
    const pathNavEl = document.getElementById('pathNav');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const createDirBtn = document.getElementById('createDirBtn');

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadPath(currentRelativePath);
        uploadBtn.addEventListener('click', handleFileUpload);
        createDirBtn.addEventListener('click', handleCreateDir);
    });

    // 获取当前API绝对路径
    function getCurrentApiPath() {
        return DAV_API_ROOT + currentRelativePath;
    }

    // 判断文件是否支持在线浏览
    function isViewableFile(fileName) {
        const ext = fileName.toLowerCase().split('.').pop();
        return VIEWABLE_EXTENSIONS.includes(ext);
    }

    // 加载指定路径的文件列表（纯JSON版，无HTML解析）
    async function loadPath(relativePath) {
        currentRelativePath = relativePath;
        renderPathNav();
        fileListEl.innerHTML = '<div class="loading">加载中...</div>';

        try {
            const apiPath = getCurrentApiPath();
            const response = await fetch(apiPath, {
                credentials: 'include'
            });

            if (!response.ok) {
                if (response.status === 401) throw new Error('认证失败，请刷新页面重新输入账号密码');
                throw new Error(`请求失败: HTTP ${response.status} ${response.statusText}`);
            }

            // 直接解析JSON，彻底删除旧的HTML解析逻辑
            const rawFileList = await response.json();
            const files = parseAutoIndexJSON(rawFileList);
            renderFileList(files);

        } catch (err) {
            fileListEl.innerHTML = `<div class="error">❌ ${err.message}</div>`;
            console.error('加载失败', err);
        }
    }

    // 纯JSON解析函数（极简稳定，替代原HTML解析）
    function parseAutoIndexJSON(jsonData) {
        const files = [];
        jsonData.forEach(item => {
            // 跳过上级目录
            if (item.name === '..') return;

            const isDir = item.type === 'directory';
            const fileName = item.name;
            const href = isDir ? `${encodeURIComponent(fileName)}/` : encodeURIComponent(fileName);
            
            // 前端自由格式化大小（不受Nginx配置影响）
            const formatSize = (bytes) => {
                if (bytes === 0 || isDir) return '-';
                const units = ['B', 'K', 'M', 'G', 'T'];
                const i = Math.floor(Math.log(bytes) / Math.log(1024));
                return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + units[i];
            };

            // 前端自由格式化时间（不受Nginx配置影响）
            const formatTime = (isoTime) => {
                const date = new Date(isoTime);
                return date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            files.push({
                fileName,
                href,
                isDir,
                fileSize: formatSize(item.size),
                modifyTime: formatTime(item.mtime),
                fullRelativePath: currentRelativePath + href
            });
        });
        return files;
    }

    // 渲染路径导航（完全不变）
    function renderPathNav() {
        const pathParts = currentRelativePath.split('/').filter(item => item);
        let html = `<a href="#" onclick="loadPath(''); return false;">📂 根目录</a>`;
        let currentPath = '';

        pathParts.forEach((part, index) => {
            currentPath += part + '/';
            const isLast = index === pathParts.length - 1;
            html += isLast 
                ? ` / <span>${decodeURIComponent(part)}</span>`
                : ` / <a href="#" onclick="loadPath('${currentPath}'); return false;">${decodeURIComponent(part)}</a>`;
        });

        pathNavEl.innerHTML = html;
    }

    // 渲染文件列表（完全不变）
    function renderFileList(files) {
        if (files.length === 0) {
            fileListEl.innerHTML = '<div class="loading">当前目录为空</div>';
            return;
        }

        let html = '';
        files.forEach(file => {
            const icon = file.isDir ? '📁' : '📄';
            const fileNameDecoded = decodeURIComponent(file.fileName);
            
            // 文件名链接（点击目录进入，点击可浏览文件在新窗口打开，点击不可浏览文件下载）
            const fileNameLink = file.isDir
                ? `<a href="#" onclick="loadPath('${file.fullRelativePath}'); return false;">${fileNameDecoded}</a>`
                : isViewableFile(fileNameDecoded)
                    ? `<a href="${DAV_API_ROOT}${file.fullRelativePath}" target="_blank">${fileNameDecoded}</a>`
                    : `<a href="${DAV_API_ROOT}${file.fullRelativePath}" target="_blank" download="${fileNameDecoded}">${fileNameDecoded}</a>`;

            html += `
                <div class="file-item">
                    <!-- 第一行：图标+文件名 -->
                    <div class="file-name-row">
                        <span class="file-icon">${icon}</span>
                        <div class="file-name">${fileNameLink}</div>
                    </div>
                    
                    <!-- 第二行：大小+时间 -->
                    <div class="file-meta-row">
                        <span class="file-meta file-size">${file.fileSize}</span>
                        <span class="file-meta file-time">${file.modifyTime}</span>
                    </div>
                    
                    <!-- 第三行：操作按钮 -->
                    <div class="file-op-row">
                        ${!file.isDir ? `<button class="btn btn-default" onclick="handleDownload('${file.fullRelativePath}', '${file.fileName}')">下载</button>` : ''}
                        <button class="btn btn-default" onclick="handleRename('${file.fullRelativePath}', '${file.fileName}', ${file.isDir})">重命名</button>
                        <button class="btn btn-danger" onclick="handleDelete('${file.fullRelativePath}', ${file.isDir})">删除</button>
                    </div>
                </div>
            `;
        });

        fileListEl.innerHTML = html;
    }

    // 处理文件上传（带进度条）
    function handleFileUpload() {
        const files = fileInput.files;
        if (files.length === 0) {
            alert('请先选择要上传的文件');
            return;
        }

        // 显示进度条区域
        const progressArea = document.getElementById('uploadProgressArea');
        const progressList = document.getElementById('progressList');
        progressArea.style.display = 'block';
        progressList.innerHTML = '';

        // 用于跟踪所有上传请求
        const xhrs = [];
        window.uploadXhrs = xhrs;
        let completedCount = 0;
        const totalFiles = files.length;

        Array.from(files).forEach((file, index) => {
            const encodedFileName = encodeURIComponent(file.name);
            const targetPath = DAV_API_ROOT + currentRelativePath + encodedFileName;

            // 创建进度条元素
            const progressItem = document.createElement('div');
            progressItem.className = 'progress-item';
            progressItem.innerHTML = `
                <div class="progress-file-name">${file.name}</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width: 0%">
                        <span class="progress-bar-text">0%</span>
                    </div>
                </div>
                <div class="progress-status">准备上传...</div>
                <button class="btn btn-default progress-btn-cancel" onclick="cancelUpload(${index})">取消</button>
            `;
            progressList.appendChild(progressItem);

            // 创建XMLHttpRequest
            const xhr = new XMLHttpRequest();
            xhrs[index] = xhr;

            xhr.open('PUT', targetPath);
            xhr.withCredentials = true;

            // 上传进度监听
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    const progressFill = progressItem.querySelector('.progress-bar-fill');
                    const progressText = progressItem.querySelector('.progress-bar-text');
                    const progressStatus = progressItem.querySelector('.progress-status');

                    progressFill.style.width = percentComplete + '%';
                    progressText.textContent = percentComplete + '%';
                    progressStatus.textContent = '上传中...';
                }
            });

            // 上传完成监听
            xhr.addEventListener('load', () => {
                const progressStatus = progressItem.querySelector('.progress-status');
                const cancelBtn = progressItem.querySelector('.progress-btn-cancel');

                completedCount++;

                if (xhr.status === 200 || xhr.status === 201) {
                    progressStatus.textContent = '上传成功';
                    progressStatus.className = 'progress-status success';
                    cancelBtn.textContent = '完成';
                    cancelBtn.disabled = true;
                } else {
                    progressStatus.textContent = `上传失败 (${xhr.status})`;
                    progressStatus.className = 'progress-status error';
                    cancelBtn.textContent = '重试';
                    cancelBtn.onclick = () => {
                        // 重试逻辑
                        handleFileUpload();
                    };
                }

                // 所有文件上传完成后刷新文件列表
                if (completedCount === totalFiles) {
                    setTimeout(() => {
                        fileInput.value = '';
                        loadPath(currentRelativePath);
                        // 可选：3秒后自动隐藏进度条
                        setTimeout(() => {
                            progressArea.style.display = 'none';
                        }, 3000);
                    }, 500);
                }
            });

            // 上传错误监听
            xhr.addEventListener('error', () => {
                const progressStatus = progressItem.querySelector('.progress-status');
                const cancelBtn = progressItem.querySelector('.progress-btn-cancel');
                progressStatus.textContent = '网络错误';
                progressStatus.className = 'progress-status error';
                cancelBtn.textContent = '重试';
                cancelBtn.onclick = () => {
                    handleFileUpload();
                };
            });

            // 取消按钮事件（已在HTML中绑定）
            // 发送请求
            xhr.send(file);
        });
    }

    // 取消上传
    function cancelUpload(index) {
        const xhrs = window.uploadXhrs || [];
        const xhr = xhrs[index];
        if (xhr && xhr.readyState !== XMLHttpRequest.DONE) {
            xhr.abort();
            const progressList = document.getElementById('progressList');
            const progressItem = progressList.children[index];
            const progressStatus = progressItem.querySelector('.progress-status');
            const cancelBtn = progressItem.querySelector('.progress-btn-cancel');
            progressStatus.textContent = '已取消';
            progressStatus.className = 'progress-status error';
            cancelBtn.textContent = '重试';
            cancelBtn.onclick = () => {
                handleFileUpload();
            };
        }
    }

    // 处理新建目录（完全不变）
    async function handleCreateDir() {
        const dirName = prompt('请输入新建目录的名称：');
        if (!dirName || dirName.trim() === '') return;

        const encodedDirName = encodeURIComponent(dirName.trim());
        const targetPath = DAV_API_ROOT + currentRelativePath + encodedDirName + '/';

        try {
            const response = await fetch(targetPath, {
                method: 'MKCOL',
                credentials: 'include'
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            loadPath(currentRelativePath);
        } catch (err) {
            alert(`创建目录失败：${err.message}`);
            console.error('创建目录失败', err);
        }
    }

    // 处理重命名（完全不变）
    async function handleRename(oldFullPath, oldFileName, isDir) {
        const oldNameDecoded = decodeURIComponent(oldFileName);
        const promptTip = isDir 
            ? '请输入目录新名称：'
            : '请输入文件新名称（建议保留后缀名，避免文件无法识别）：';
        const newName = prompt(promptTip, oldNameDecoded);
        
        if (!newName || newName.trim() === '' || newName.trim() === oldNameDecoded) return;

        const encodedNewName = encodeURIComponent(newName.trim());
        const oldPath = DAV_API_ROOT + oldFullPath;
        const pathPrefix = oldFullPath.substring(0, oldFullPath.lastIndexOf(oldFileName));
        const newFullPath = pathPrefix + encodedNewName + (isDir ? '/' : '');
        const newPath = DAV_API_ROOT + newFullPath;

        try {
            const response = await fetch(oldPath, {
                method: 'MOVE',
                headers: { 'Destination': newPath },
                credentials: 'include'
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            loadPath(currentRelativePath);
        } catch (err) {
            alert(`重命名失败：${err.message}`);
            console.error('重命名失败', err);
        }
    }

    // 处理下载（强制下载任何文件）
    function handleDownload(fullPath, fileName) {
        const fileNameDecoded = decodeURIComponent(fileName);
        const link = document.createElement('a');
        link.href = DAV_API_ROOT + fullPath;
        link.download = fileNameDecoded;
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 处理删除（完全不变）
    async function handleDelete(fullPath, isDir) {
        const confirmMsg = isDir
            ? `⚠️ 确定要删除此目录吗？\n注意：仅支持删除空目录，非空目录会删除失败`
            : `⚠️ 确定要删除此文件吗？`;
        if (!confirm(confirmMsg)) return;

        const targetPath = DAV_API_ROOT + fullPath;
        try {
            const response = await fetch(targetPath, {
                method: 'DELETE',
                credentials: 'include'
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            loadPath(currentRelativePath);
        } catch (err) {
            alert(`删除失败：${err.message}`);
            console.error('删除失败', err);
        }
    }
    </script>
</body>
</html>
