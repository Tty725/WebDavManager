<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <title>WebDAV - 未名的云</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            line-height: 1.6;
            color: #333;
            background: #fff;
            transition: all 0.3s ease;
        }

        /* 深色模式 */
        body.dark-mode {
            color: #e0e0e0;
            background: #1a1a1a;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.5em;
            color: #222;
        }

        body.dark-mode h1 {
            color: #fff;
        }

        /* 工具栏：移动端自动换行 */
        .toolbar {
            margin-bottom: 20px;
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            transition: all 0.3s ease;
        }

        body.dark-mode .toolbar {
            background: #2d2d2d;
        }

        #fileInput {
            flex: 1;
            min-width: 180px;
            padding: 8px;
            font-size: 1em;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        #pathNavContent {
            flex: 1;
            margin-right: 10px;
        }

        body.dark-mode #fileInput {
            background: #3d3d3d;
            border-color: #555;
            color: #e0e0e0;
        }

        /* 按钮容器：在移动端右对齐 */
        .toolbar-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        /* 主题切换按钮 */
        .theme-toggle-btn {
            padding: 8px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
            background: transparent;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        body.dark-mode .theme-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .theme-toggle-btn {
            color: #aaa;
        }

        .theme-toggle-btn svg {
            transition: transform 0.3s ease;
        }

        .theme-toggle-btn:hover svg {
            transform: scale(1.1);
        }

        /* 语言切换按钮 */
        .language-toggle-btn {
            padding: 8px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
            background: transparent;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            width: 36px;
            height: 36px;
            box-sizing: border-box;
        }

        .language-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        body.dark-mode .language-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .language-toggle-btn {
            color: #aaa;
        }

        .language-toggle-btn svg {
            transition: transform 0.3s ease;
        }

        .language-toggle-btn:hover svg {
            transform: scale(1.1);
        }

        /* 路径导航按钮容器 */
        .path-nav-buttons {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-shrink: 0;
        }

        /* 路径导航 */
        .path-nav {
            margin-bottom: 15px;
            font-size: 1em;
            padding: 0;
            border-bottom: 1px solid #eee;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        body.dark-mode .path-nav {
            border-bottom-color: #444;
        }

        .path-nav a {
            color: #1890ff;
            text-decoration: none;
        }

        .path-nav a:hover {
            text-decoration: underline;
        }

        /* PC端表头（移动端隐藏） */
        .file-list-header {
            display: none;
            /* 默认隐藏，PC端媒体查询显示 */
        }

        /* 文件列表容器 */
        #fileList {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }

        body.dark-mode #fileList {
            border-color: #444;
        }

        /* 文件项：移动端默认垂直堆叠 */
        .file-item {
            display: flex;
            flex-direction: column;
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
            transition: background 0.2s;
        }

        body.dark-mode .file-item {
            border-bottom-color: #333;
            background: #2a2a2a;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:active {
            background: #f8f9fa;
        }

        body.dark-mode .file-item:active {
            background: #3a3a3a;
        }

        /* 文件名行 */
        .file-name-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .file-icon {
            font-size: 1.2em;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .file-name {
            flex: 1;
            word-break: break-all;
            font-weight: 500;
            color: #333;
        }

        body.dark-mode .file-name {
            color: #e0e0e0;
        }

        .file-name a {
            color: #1890ff;
            text-decoration: none;
        }

        .file-name a:hover {
            text-decoration: underline;
        }

        /* 元数据行（大小+时间） */
        .file-meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
        }

        body.dark-mode .file-meta-row {
            color: #aaa;
        }

        /* 操作按钮行 */
        .file-op-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 按钮样式：增大触摸区域 */
        .btn {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }

        .btn:active {
            opacity: 0.7;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
        }

        .btn-danger {
            background: #e6e6e6;
            color: #333;
            border: 1px solid #ff4d4f;
        }

        body.dark-mode .btn-danger {
            background: #444;
            color: #e0e0e0;
            border: 1px solid #ff4d4f;
        }

        .btn-default {
            background: #e6e6e6;
            color: #333;
        }

        body.dark-mode .btn-default {
            background: #444;
            color: #e0e0e0;
        }

        /* 状态提示 */
        .loading,
        .error {
            padding: 40px 20px;
            text-align: center;
            color: #666;
        }

        body.dark-mode .loading {
            color: #aaa;
        }

        .error {
            color: #ff4d4f;
        }

        /* 上传进度区域 */
        .upload-progress-area {
            background: #f5f7fa;
            transition: all 0.3s ease;
        }

        body.dark-mode .upload-progress-area {
            background: #2d2d2d;
        }

        .upload-progress-title {
            color: #222;
            transition: all 0.3s ease;
        }

        body.dark-mode .upload-progress-title {
            color: #fff;
        }

        /* ========== 关键：PC端媒体查询（屏幕宽度 > 768px） ========== */
        @media (min-width: 768px) {
            body {
                margin: 30px auto;
                padding: 0 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            /* 显示PC端表头 */
            .file-list-header {
                display: flex;
                padding: 12px 15px;
                background: #fafafa;
                font-weight: 600;
                color: #666;
                border-bottom: 1px solid #eee;
                transition: all 0.3s ease;
            }

            body.dark-mode .file-list-header {
                background: #2d2d2d;
                color: #aaa;
                border-bottom-color: #444;
            }

            .file-name-col {
                flex: 3;
            }

            .file-size-col {
                text-align: right;
                flex: 1;
                min-width: 20px;
            }

            .file-time-col {
                text-align: right;
                flex: 1.5;
                min-width: 50px;
            }

            .file-op-col {
                flex: 1;
                text-align: right;
                min-width: 280px;
            }

            /* 文件项改回横向布局 */
            .file-item {
                flex-direction: row;
                align-items: center;
                padding: 12px 15px;
            }

            /* PC端文件项横向布局，和表头对齐 */
            .file-item {
                flex-direction: row;
                align-items: center;
            }

            /* PC端各列宽度和表头严格对应 */
            .file-name-row {
                flex: 3;
                margin-right: 15px;
                margin-bottom: 0;
            }

            .file-meta-row {
                flex: 2.5;
                justify-content: flex-start;
                gap: 0;
                margin-bottom: 0;
            }

            .file-op-row {
                flex: 1;
                justify-content: flex-end;
                gap: 10px;
                /* 和工具栏按钮间距完全一致 */
            }

            /* 优化PC端列布局 - 与表头严格对齐 */
            .file-icon {
                margin-right: 8px;
            }

            /* 文件名列 */
            .file-name-row {
                flex: 3;
                margin-right: 15px;
                margin-bottom: 0;
            }

            .file-name {
                margin-bottom: 0;
                font-weight: normal;
            }

            /* 元数据列（包含大小和时间） - 调整为与表头对齐 */
            .file-meta-row {
                display: flex;
                flex: 2.5;
                /* 1 + 1.5 = 2.5，与表头大小+时间列总和一致 */
                justify-content: flex-start;
                gap: 0;
                /* 取消间隔，使用与表头相同的对齐方式 */
                margin-bottom: 0;
            }

            .file-meta {
                color: #666;
                font-size: 0.9em;
            }

            /* 文件大小列 - 与表头 .file-size-col 一致 */
            .file-size {
                text-align: right;
                flex: 1;
                min-width: 20px;
                margin-bottom: 0;
            }

            /* 文件时间列 - 与表头 .file-time-col 一致 */
            .file-time {
                text-align: right;
                flex: 1.5;
                min-width: 50px;
                margin-bottom: 0;
            }

            /* 操作列 - 与表头 .file-op-col 严格一致 */
            .file-op-row {
                flex: 1;
                text-align: right;
                min-width: 280px;
                margin-bottom: 0;
            }

            /* PC端上传进度条布局 */
            .progress-item {
                flex-direction: row !important;
                align-items: center !important;
            }

            .progress-file-name {
                flex: 2;
                margin-right: 15px;
                margin-bottom: 0 !important;
            }

            .progress-bar-container {
                flex: 2;
                margin-right: 15px;
                margin-bottom: 0 !important;
            }

            .progress-status {
                flex: 0 0 80px;
                margin-right: 10px;
                margin-bottom: 0 !important;
                text-align: right;
            }

            .progress-btn-cancel {
                flex: 0 0 auto;
                margin-bottom: 0 !important;
            }
        }

        /* ========== 上传进度条样式 ========== */
        .progress-item {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        body.dark-mode .progress-item {
            border-bottom-color: #444;
        }

        .progress-item:last-child {
            border-bottom: none;
        }

        .progress-file-name {
            font-size: 0.9em;
            color: #333;
            margin-bottom: 8px;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        body.dark-mode .progress-file-name {
            color: #e0e0e0;
        }

        .progress-bar-container {
            width: 100%;
            height: 20px;
            background: #e8e8e8;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        body.dark-mode .progress-bar-container {
            background: #3d3d3d;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #1890ff, #52c41a);
            border-radius: 10px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
        }

        .progress-bar-text {
            font-size: 0.75em;
            color: white;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .progress-status {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        body.dark-mode .progress-status {
            color: #aaa;
        }

        .progress-status.success {
            color: #52c41a;
        }

        .progress-status.error {
            color: #ff4d4f;
        }

        .progress-btn-cancel {
            padding: 6px 12px;
            font-size: 0.85em;
            min-height: 36px;
            align-self: flex-end;
        }

        /* 页脚样式 */
        #pageFooter {
            margin-top: 15px;
            padding-top: 0px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 0.85em;
            color: #666;
            transition: all 0.3s ease;
        }

        body.dark-mode #pageFooter {
            border-top-color: #444;
            color: #888;
        }

        #pageFooter a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        #pageFooter a:hover {
            color: #333;
            text-decoration: underline;
        }

        body.dark-mode #pageFooter a {
            color: #888;
        }

        body.dark-mode #pageFooter a:hover {
            color: #aaa;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>WebDAV 文件管理器</h1>

    <!-- 路径导航 -->
    <div class="path-nav" id="pathNav">
        <span id="pathNavContent"></span>
        <div class="path-nav-buttons">
            <button class="language-toggle-btn" id="languageToggleBtn" title="切换语言">
                <svg id="languageIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- 初始图标将在 JS 中动态生成 -->
                </svg>
            </button>
            <button class="theme-toggle-btn" id="themeToggleBtn" title="切换主题">
                <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- 默认显示自动图标 -->
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <input type="file" id="fileInput" multiple>
        <div class="toolbar-buttons">
            <button class="btn btn-primary" id="uploadBtn">上传选中文件</button>
            <button class="btn btn-default" id="createDirBtn">新建目录</button>
        </div>
    </div>

    <!-- 上传进度条区域 -->
    <div id="uploadProgressArea" class="upload-progress-area"
        style="display: none; margin-bottom: 20px; padding: 12px; border-radius: 8px;">
        <h3 class="upload-progress-title" style="margin-bottom: 10px; font-size: 1em;">上传进度</h3>
        <div id="progressList"></div>
    </div>

    <!-- PC端表头 -->
    <div class="file-list-header">
        <div class="file-name-col">文件名</div>
        <div class="file-size-col">大小</div>
        <div class="file-time-col">修改时间</div>
        <div class="file-op-col">操作</div>
    </div>

    <!-- 文件列表 -->
    <div id="fileList"></div>

    <!-- 页脚 -->
    <footer id="pageFooter">
        <p>© <span id="currentYear"></span> <a href="https://T725.CN" target="_blank">T725.CN</a> | <a href="https://github.com/Tty725/WebDavManager" target="_blank">WebDavManager</a></p>
    </footer>

    <script>
        // ========== 核心配置（和Nginx配置保持一致即可） ==========
        const DAV_API_ROOT = '/dav/';

        // 支持在线浏览的文件扩展名列表（可配置）
        const VIEWABLE_EXTENSIONS = [
            // HTML/XML
            'html', 'htm', 'xml', 'xhtml',
            // 图片
            'png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'svg', 'ico',
            // 文本
            'txt', 'md', 'json', 'css', 'js', 'ts', 'jsx', 'tsx', 'py', 'java', 'cpp', 'c', 'h', 'rb', 'php', 'sh', 'bat',

        // ==========================================================

        // ========== 语言资源定义 ==========

                'rename': 'Rename',

                'operation': 'Operation'
            }
        };

        // ========== 语言管理函数 ==========
        let currentLanguage = 'auto'; // 'zh', 'en', 'auto'

        // 初始化语言设置
        function initLanguage() {
            const savedLanguage = localStorage.getItem('fileManagerLanguage');
            if (savedLanguage) {
                currentLanguage = savedLanguage;
            } else {
                // 自动检测设备语言：汉语显示中文，其他语言显示英文
                const deviceLang = navigator.language.toLowerCase();
                currentLanguage = deviceLang.includes('zh') ? 'zh' : 'en';
            }
            applyLanguage(currentLanguage);
            updateLanguageIcon();
        }

        // 应用语言
        function applyLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('fileManagerLanguage', lang);

            const actualLang = lang === 'auto'
                ? (navigator.language.toLowerCase().includes('zh') ? 'zh' : 'en')
                : lang;

            const resources = languageResources[actualLang];

            // 更新页面标题
            document.title = resources.title;
            // 更新h1标题
            document.querySelector('h1').textContent = resources.h1;

            // 更新导航栏
            updatePathNavLabels();
            // 更新按钮提示文字
            document.getElementById('languageToggleBtn').title = resources.languageBtnTitle;
            document.getElementById('themeToggleBtn').title = resources.themeBtnTitle;

            // 更新工具栏按钮
            document.getElementById('uploadBtn').textContent = resources.uploadBtn;
            document.getElementById('createDirBtn').textContent = resources.createDirBtn;

            // 更新上传进度区域标题
            document.querySelector('.upload-progress-title').textContent = resources.uploadProgress;

            // 更新表头
            document.querySelectorAll('.file-list-header div')[0].textContent = resources.file;
            document.querySelectorAll('.file-list-header div')[1].textContent = resources.size;
            document.querySelectorAll('.file-list-header div')[2].textContent = resources.modifyTime;
            document.querySelectorAll('.file-list-header div')[3].textContent = resources.operation;

            // 更新文件列表
            updateFileListLabels();

            // 更新加载/空目录提示
            if (document.querySelector('.loading')) {
                document.querySelector('.loading').textContent = resources.loading;
            }
        }

        // 更新路径导航标签
        function updatePathNavLabels() {
            const resources = getCurrentLanguageResources();
            const rootLink = document.querySelector('.path-nav a:first-child');
            if (rootLink) {
                rootLink.textContent = resources.rootDir;
            }
        }

        // 更新文件列表标签
        function updateFileListLabels() {
            const resources = getCurrentLanguageResources();
            const fileItems = document.querySelectorAll('.file-item');

            fileItems.forEach(item => {
                // 更新下载按钮
                const downloadBtn = item.querySelector('.btn-default:first-child');
                if (downloadBtn && (downloadBtn.textContent.includes('下载') || downloadBtn.textContent.includes('Download'))) {
                    downloadBtn.textContent = resources.download;
                }

                // 更新重命名按钮
                const renameBtn = item.querySelector('.btn-default:nth-child(2)');
                if (renameBtn && (renameBtn.textContent.includes('重命名') || renameBtn.textContent.includes('Rename'))) {
                    renameBtn.textContent = resources.rename;
                }

                // 更新删除按钮
                const deleteBtn = item.querySelector('.btn-danger');
                if (deleteBtn && (deleteBtn.textContent.includes('删除') || deleteBtn.textContent.includes('Delete'))) {
                    deleteBtn.textContent = resources.delete;
                }
            });
        }

        // 获取当前语言资源
        function getCurrentLanguageResources() {
            const actualLang = currentLanguage === 'auto'
                ? (navigator.language.toLowerCase().includes('zh') ? 'zh' : 'en')
                : currentLanguage;
            return languageResources[actualLang];
        }

        // 语言切换逻辑
        function toggleLanguage() {
            let nextLanguage;
            if (currentLanguage === 'zh') {
                nextLanguage = 'en';
            } else if (currentLanguage === 'en') {
                nextLanguage = 'auto';
            } else {
                // auto 模式下点击切换到 zh
                nextLanguage = 'zh';
            }

            applyLanguage(nextLanguage);
            updateLanguageIcon();
            // 重新加载文件列表以更新按钮文案
            loadPath(currentRelativePath);
        }

        // 更新语言切换按钮图标
        function updateLanguageIcon() {
            const languageIcon = document.getElementById('languageIcon');
            languageIcon.innerHTML = '';

            const iconPath = `<path fill="none" stroke="currentColor" stroke-width="1" d="m18.5 10l4.4 11h-2.155l-1.201-3h-4.09l-1.199 3h-2.154L16.5 10zM10 2v2h6v2h-1.968a18.2 18.2 0 0 1-3.62 6.301a15 15 0 0 0 2.335 1.707l-.75 1.878A17 17 0 0 1 9 13.725a16.7 16.7 0 0 1-6.201 3.548l-.536-1.929a14.7 14.7 0 0 0 5.327-3.042A18 18 0 0 1 4.767 8h2.24A16 16 0 0 0 9 10.877a16.2 16.2 0 0 0 2.91-4.876L2 6V4h6V2zm7.5 10.885L16.253 16h2.492z"></path>`;

            languageIcon.innerHTML = iconPath;
        }

        // 全局状态
        let currentRelativePath = '';
        const fileListEl = document.getElementById('fileList');
        const pathNavEl = document.getElementById('pathNav');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const createDirBtn = document.getElementById('createDirBtn');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 设置当前年份
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            // 初始化主题
            initTheme();
            // 初始化语言
            initLanguage();
            // 绑定主题按钮事件
            document.getElementById('themeToggleBtn').addEventListener('click', () => {
                toggleTheme();
                updateThemeIcon();
            });
            // 绑定语言按钮事件
            document.getElementById('languageToggleBtn').addEventListener('click', () => {
                toggleLanguage();
                updateLanguageIcon();
            });
            // 加载文件列表
            loadPath(currentRelativePath);
            uploadBtn.addEventListener('click', handleFileUpload);
            createDirBtn.addEventListener('click', handleCreateDir);
        });

        // 获取当前API绝对路径
        function getCurrentApiPath() {
            return DAV_API_ROOT + currentRelativePath;
        }

        // 判断文件是否支持在线浏览
        function isViewableFile(fileName) {
            const ext = fileName.toLowerCase().split('.').pop();
            return VIEWABLE_EXTENSIONS.includes(ext);
        }

        // 加载指定路径的文件列表（纯JSON版，无HTML解析）
        async function loadPath(relativePath) {
            const resources = getCurrentLanguageResources();
            currentRelativePath = relativePath;
            renderPathNav();
            fileListEl.innerHTML = `<div class="loading">${resources.loading}</div>`;

            try {
                const apiPath = getCurrentApiPath();
                const response = await fetch(apiPath, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    if (response.status === 401) throw new Error(resources.authFailed);
                    throw new Error(`${resources.requestFailed} HTTP ${response.status} ${response.statusText}`);
                }

                // 直接解析JSON，彻底删除旧的HTML解析逻辑
                const rawFileList = await response.json();
                const files = parseAutoIndexJSON(rawFileList);
                renderFileList(files);

            } catch (err) {
                fileListEl.innerHTML = `<div class="error">❌ ${err.message}</div>`;
                console.error('加载失败', err);
            }
        }

        // 纯JSON解析函数（极简稳定，替代原HTML解析）
        function parseAutoIndexJSON(jsonData) {
            const files = [];
            jsonData.forEach(item => {
                // 跳过上级目录
                if (item.name === '..') return;

                const isDir = item.type === 'directory';
                const fileName = item.name;
                const href = isDir ? `${encodeURIComponent(fileName)}/` : encodeURIComponent(fileName);

                // 前端自由格式化大小（不受Nginx配置影响）
                const formatSize = (bytes) => {
                    if (bytes === 0 || isDir) return '-';
                    const units = ['B', 'K', 'M', 'G', 'T'];
                    const i = Math.floor(Math.log(bytes) / Math.log(1024));
                    return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + units[i];
                };

                // 前端自由格式化时间（不受Nginx配置影响）
                const formatTime = (isoTime) => {
                    const date = new Date(isoTime);
                    return date.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                };

                files.push({
                    fileName,
                    href,
                    isDir,
                    fileSize: formatSize(item.size),
                    modifyTime: formatTime(item.mtime),
                    fullRelativePath: currentRelativePath + href
                });
            });
            return files;
        }

        // 渲染路径导航
        function renderPathNav() {
            const resources = getCurrentLanguageResources();
            const pathParts = currentRelativePath.split('/').filter(item => item);
            let html = `<a href="#" onclick="loadPath(''); return false;">${resources.rootDir}</a>`;
            let currentPath = '';

            pathParts.forEach((part, index) => {
                currentPath += part + '/';
                const isLast = index === pathParts.length - 1;
                html += isLast
                    ? ` / <span>${decodeURIComponent(part)}</span>`
                    : ` / <a href="#" onclick="loadPath('${currentPath}'); return false;">${decodeURIComponent(part)}</a>`;
            });

            document.getElementById('pathNavContent').innerHTML = html;
        }

        // 更新主题图标
        function updateThemeIcon() {
            const resources = getCurrentLanguageResources();
            const themeIcon = document.getElementById('themeIcon');
            const themeToggleBtn = document.getElementById('themeToggleBtn');

            // 移除所有现有图标内容
            themeIcon.innerHTML = '';

            if (currentTheme === 'light') {
                // 浅色模式图标 - 太阳
                themeToggleBtn.title = resources.themeLightTitle;
                themeIcon.innerHTML = `
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            `;
            } else if (currentTheme === 'dark') {
                // 深色模式图标 - 月亮
                themeToggleBtn.title = resources.themeDarkTitle;
                themeIcon.innerHTML = `
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            `;
            } else {
                // 自动模式图标 - 太阳和月亮结合
                themeToggleBtn.title = resources.themeAutoTitle;
                themeIcon.innerHTML = `
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            `;
            }
        }

        // 主题切换相关
        let currentTheme = 'auto'; // 'light', 'dark', 'auto'

        // 初始化主题
        function initTheme() {
            // 检查本地存储
            const savedTheme = localStorage.getItem('fileManagerTheme');
            if (savedTheme) {
                currentTheme = savedTheme;
            } else {
                // 检查系统主题
                currentTheme = 'auto'; // 初次进入默认为自动模式
            }
            applyTheme(currentTheme);
            updateThemeIcon();
        }

        // 应用主题
        function applyTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('fileManagerTheme', theme);

            // 移除所有主题类
            document.body.classList.remove('light-mode', 'dark-mode');

            if (theme === 'auto') {
                // 跟随系统
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.body.classList.add(isDark ? 'dark-mode' : 'light-mode');
            } else {
                document.body.classList.add(`${theme}-mode`);
            }
        }

        // 主题切换事件
        function toggleTheme() {
            // 切换顺序：
            // 当前为浅色 → 点击 → 深色 → 点击 → 自动 → 点击 → 浅色...
            // 当前为深色 → 点击 → 浅色 → 点击 → 自动 → 点击 → 深色...
            // 当前为自动 → 点击 → 浅色 → 点击 → 深色 → 点击 → 自动...

            // 首先确定当前实际显示的模式（用于判断切换方向）
            const isCurrentlyDark = document.body.classList.contains('dark-mode');

            if (currentTheme === 'auto') {
                // 自动模式下，先切换到浅色
                applyTheme('light');
            } else if (currentTheme === 'light') {
                // 浅色模式下，切换到深色
                applyTheme('dark');
            } else {
                // 深色模式下，切换到自动
                applyTheme('auto');
            }
            updateThemeIcon();
        }

        // 系统主题变化监听
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (currentTheme === 'auto') {
                applyTheme('auto');
            }
        });

        // 渲染文件列表（完全不变）
        function renderFileList(files) {
            const resources = getCurrentLanguageResources();
            if (files.length === 0) {
                fileListEl.innerHTML = `<div class="loading">${resources.emptyDir}</div>`;
                return;
            }

            let html = '';
            files.forEach(file => {
                const icon = file.isDir ? '📁' : '📄';
                const fileNameDecoded = decodeURIComponent(file.fileName);

                // 文件名链接（点击目录进入，点击可浏览文件在新窗口打开，点击不可浏览文件下载）
                const fileNameLink = file.isDir
                    ? `<a href="#" onclick="loadPath('${file.fullRelativePath}'); return false;">${fileNameDecoded}</a>`
                    : isViewableFile(fileNameDecoded)
                        ? `<a href="${DAV_API_ROOT}${file.fullRelativePath}" target="_blank">${fileNameDecoded}</a>`
                        : `<a href="${DAV_API_ROOT}${file.fullRelativePath}" target="_blank" download="${fileNameDecoded}">${fileNameDecoded}</a>`;

                html += `
                <div class="file-item">
                    <!-- 第一行：图标+文件名 -->
                    <div class="file-name-row">
                        <span class="file-icon">${icon}</span>
                        <div class="file-name">${fileNameLink}</div>
                    </div>
                    
                    <!-- 第二行：大小+时间 -->
                    <div class="file-meta-row">
                        <span class="file-meta file-size">${file.fileSize}</span>
                        <span class="file-meta file-time">${file.modifyTime}</span>
                    </div>
                    
                    <!-- 第三行：操作按钮 -->
                    <div class="file-op-row">
                        ${!file.isDir ? `<button class="btn btn-default" onclick="handleDownload('${file.fullRelativePath}', '${file.fileName}')">${resources.download}</button>` : ''}
                        <button class="btn btn-default" onclick="handleRename('${file.fullRelativePath}', '${file.fileName}', ${file.isDir})">${resources.rename}</button>
                        <button class="btn btn-danger" onclick="handleDelete('${file.fullRelativePath}', ${file.isDir})">${resources.delete}</button>
                    </div>
                </div>
            `;
            });

            fileListEl.innerHTML = html;
        }

        // 处理文件上传（带进度条）
        function handleFileUpload() {
            const resources = getCurrentLanguageResources();
            const files = fileInput.files;
            if (files.length === 0) {
                alert(resources.selectFileFirst);
                return;
            }

            // 显示进度条区域
            const progressArea = document.getElementById('uploadProgressArea');
            const progressList = document.getElementById('progressList');
            progressArea.style.display = 'block';
            progressList.innerHTML = '';

            // 用于跟踪所有上传请求
            const xhrs = [];
            window.uploadXhrs = xhrs;
            let completedCount = 0;
            const totalFiles = files.length;

            Array.from(files).forEach((file, index) => {
                const encodedFileName = encodeURIComponent(file.name);
                const targetPath = DAV_API_ROOT + currentRelativePath + encodedFileName;

                // 创建进度条元素
                const progressItem = document.createElement('div');
                progressItem.className = 'progress-item';
                const resources = getCurrentLanguageResources();
                progressItem.innerHTML = `
                <div class="progress-file-name">${file.name}</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width: 0%">
                        <span class="progress-bar-text">0%</span>
                    </div>
                </div>
                <div class="progress-status">${resources.prepareUpload}</div>
                <button class="btn btn-default progress-btn-cancel" onclick="cancelUpload(${index})">${resources.cancel}</button>
            `;
                progressList.appendChild(progressItem);

                // 创建XMLHttpRequest
                const xhr = new XMLHttpRequest();
                xhrs[index] = xhr;

                xhr.open('PUT', targetPath);
                xhr.withCredentials = true;

                // 上传进度监听
                xhr.upload.addEventListener('progress', (e) => {
                    const resources = getCurrentLanguageResources();
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        const progressFill = progressItem.querySelector('.progress-bar-fill');
                        const progressText = progressItem.querySelector('.progress-bar-text');
                        const progressStatus = progressItem.querySelector('.progress-status');

                        progressFill.style.width = percentComplete + '%';
                        progressText.textContent = percentComplete + '%';
                        progressStatus.textContent = resources.uploading;
                    }
                });

                // 上传完成监听
                xhr.addEventListener('load', () => {
                    const resources = getCurrentLanguageResources();
                    const progressStatus = progressItem.querySelector('.progress-status');
                    const cancelBtn = progressItem.querySelector('.progress-btn-cancel');

                    completedCount++;

                    if (xhr.status === 200 || xhr.status === 201) {
                        progressStatus.textContent = resources.uploadSuccess;
                        progressStatus.className = 'progress-status success';
                        cancelBtn.textContent = resources.complete;
                        cancelBtn.disabled = true;
                    } else {
                        progressStatus.textContent = `${resources.uploadError} (${xhr.status})`;
                        progressStatus.className = 'progress-status error';
                        cancelBtn.textContent = resources.retry;
                        cancelBtn.onclick = () => {
                            // 重试逻辑
                            handleFileUpload();
                        };
                    }

                    // 所有文件上传完成后刷新文件列表
                    if (completedCount === totalFiles) {
                        setTimeout(() => {
                            fileInput.value = '';
                            loadPath(currentRelativePath);
                            // 可选：3秒后自动隐藏进度条
                            setTimeout(() => {
                                progressArea.style.display = 'none';
                            }, 3000);
                        }, 500);
                    }
                });

                // 上传错误监听
                xhr.addEventListener('error', () => {
                    const resources = getCurrentLanguageResources();
                    const progressStatus = progressItem.querySelector('.progress-status');
                    const cancelBtn = progressItem.querySelector('.progress-btn-cancel');
                    progressStatus.textContent = resources.networkError;
                    progressStatus.className = 'progress-status error';
                    cancelBtn.textContent = resources.retry;
                    cancelBtn.onclick = () => {
                        handleFileUpload();
                    };
                });

                // 取消按钮事件（已在HTML中绑定）
                // 发送请求
                xhr.send(file);
            });
        }

        // 取消上传
        function cancelUpload(index) {
            const resources = getCurrentLanguageResources();
            const xhrs = window.uploadXhrs || [];
            const xhr = xhrs[index];
            if (xhr && xhr.readyState !== XMLHttpRequest.DONE) {
                xhr.abort();
                const progressList = document.getElementById('progressList');
                const progressItem = progressList.children[index];
                const progressStatus = progressItem.querySelector('.progress-status');
                const cancelBtn = progressItem.querySelector('.progress-btn-cancel');
                progressStatus.textContent = '已取消';
                progressStatus.className = 'progress-status error';
                cancelBtn.textContent = resources.retry;
                cancelBtn.onclick = () => {
                    handleFileUpload();
                };
            }
        }

        // 处理新建目录（完全不变）
        async function handleCreateDir() {
            const resources = getCurrentLanguageResources();
            const dirName = prompt(resources.createDirPrompt);
            if (!dirName || dirName.trim() === '') return;

            const encodedDirName = encodeURIComponent(dirName.trim());
            const targetPath = DAV_API_ROOT + currentRelativePath + encodedDirName + '/';

            try {
                const response = await fetch(targetPath, {
                    method: 'MKCOL',
                    credentials: 'include'
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                loadPath(currentRelativePath);
            } catch (err) {
                alert(`${resources.createDirFailed}${err.message}`);
                console.error('创建目录失败', err);
            }
        }

        // 处理重命名（完全不变）
        async function handleRename(oldFullPath, oldFileName, isDir) {
            const resources = getCurrentLanguageResources();
            const oldNameDecoded = decodeURIComponent(oldFileName);
            const promptTip = isDir
                ? resources.renameDirPrompt
                : resources.renameFilePrompt;
            const newName = prompt(promptTip, oldNameDecoded);

            if (!newName || newName.trim() === '' || newName.trim() === oldNameDecoded) return;

            const encodedNewName = encodeURIComponent(newName.trim());
            const oldPath = DAV_API_ROOT + oldFullPath;
            const pathPrefix = oldFullPath.substring(0, oldFullPath.lastIndexOf(oldFileName));
            const newFullPath = pathPrefix + encodedNewName + (isDir ? '/' : '');
            const newPath = DAV_API_ROOT + newFullPath;

            try {
                const response = await fetch(oldPath, {
                    method: 'MOVE',
                    headers: { 'Destination': newPath },
                    credentials: 'include'
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                loadPath(currentRelativePath);
            } catch (err) {
                alert(`${resources.renameFailed}${err.message}`);
                console.error('重命名失败', err);
            }
        }

        // 处理下载（强制下载任何文件）
        function handleDownload(fullPath, fileName) {
            const fileNameDecoded = decodeURIComponent(fileName);
            const link = document.createElement('a');
            link.href = DAV_API_ROOT + fullPath;
            link.download = fileNameDecoded;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 处理删除（完全不变）
        async function handleDelete(fullPath, isDir) {
            const resources = getCurrentLanguageResources();
            const confirmMsg = isDir
                ? resources.deleteDirConfirm
                : resources.deleteFileConfirm;
            if (!confirm(confirmMsg)) return;

            const targetPath = DAV_API_ROOT + fullPath;
            try {
                const response = await fetch(targetPath, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                loadPath(currentRelativePath);
            } catch (err) {
                alert(`${resources.deleteFailed}${err.message}`);
                console.error('删除失败', err);
            }
        }
    </script>
